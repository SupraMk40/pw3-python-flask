<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayerische Motoren Werke AG</title>
</head>

<body>
     <header>
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <div>
                <h1 class="brand">Concessionária BMW - São Paulo</h1>
                <div style="font-size:0.9rem; opacity:0.9;">Veículos novos, seminovos e manutenção autorizada</div>
            </div>
        </div>
    </header>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 0; color: #222; }
        header { background: #0a1a2b; color: white; padding: 20px 16px; display: flex; align-items: center; }
        .logo { width: 64px; height: 64px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff 15%, #000 16%, #ffffff 17%, transparent 18%), radial-gradient(circle at 70% 70%, #ffffff 15%, #000 16%, #ffffff 17%, transparent 18%); display:flex; align-items:center; justify-content:center; color:#0a1a2b; font-weight:bold; font-size:20px; margin-right:12px; }
        .brand { font-size: 1.4rem; margin: 0; }
        main { padding: 24px 16px; }
        .hero { background: #eef4fb; padding: 18px; border-radius: 8px; }
        .contact { margin-top: 14px; }
        footer { background:#f5f5f5; padding:12px 16px; text-align:center; font-size:0.9rem; color:#555; margin-top:24px; }
        a.phone { color: #0a1a2b; text-decoration:none; font-weight:600; }
    </style>
<h1>Login</h1>
    <form className="form">
        <span className="input-span">
          <label htmlFor="email" className="label">Email</label>
          <input type="email" name="email" id="email" /></span>
        <span className="input-span">
            <hr>
          <label htmlFor="password" className="label">Password</label>
          <input type="password" name="password" id="password" /></span>
          <hr>
        <span className="span"><a href="#">Esqueceu a senha?</a></span>
        <input className="submit" type="submit" defaultValue="Entrar" />
        <hr
        <span className="span">Não tem conta? <a href="#">Cadastrar</a></span>
      </form>
</body>
</body>
</html>
